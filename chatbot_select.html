<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📮 추억배달 보관함 - 엽서 사진 선택</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-hover: #ff5252;
            --primary-light: rgba(255, 107, 107, 0.15);
            --bg-dark: #121214;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --kakao-yellow: #fee500;
            --kakao-brown: #3c1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 모바일 최적화 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: rgba(20, 20, 22, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 사용자 가상 정보 위젯 */
        .user-widget {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .user-id-badge {
            color: var(--kakao-yellow);
            font-weight: 600;
        }

        /* 갤러리 섹션 */
        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--primary);
            padding-left: 8px;
        }

        .photo-counter {
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
            background: var(--primary-light);
            padding: 2px 10px;
            border-radius: 20px;
        }

        .gallery-empty {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed var(--card-border);
            border-radius: 16px;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .gallery-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .gallery-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
            background: rgba(255, 107, 107, 0.05);
        }

        .card-thumb {
            width: 100%;
            height: 120px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.5s ease;
        }

        .gallery-card.selected .card-thumb {
            transform: scale(1.03);
        }

        /* 체크 표시 오버레이 */
        .check-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .gallery-card.selected .check-overlay {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .check-icon {
            color: white;
            font-size: 11px;
            font-weight: bold;
            display: none;
        }

        .gallery-card.selected .check-icon {
            display: block;
        }

        .card-info {
            padding: 10px;
            font-size: 11px;
        }

        .card-date {
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .card-desc {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        /* 폼 섹션 */
        .form-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.15);
        }

        .address-row {
            display: flex;
            gap: 8px;
        }

        .postcode-input {
            flex: 1;
        }

        .btn-postcode {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0 14px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-postcode:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* 최종 편지 입력 */
        textarea {
            height: 90px;
            resize: none;
        }

        /* 발송 버튼 */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #ff8787 100%);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.25);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(255, 107, 107, 0.35);
        }

        .btn-submit:disabled {
            background: #2e3035;
            color: #6b7280;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 모달 오버레이 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            width: 90%;
            max-width: 400px;
            background: #18191c;
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .btn-modal-close {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 100%;
            padding: 11px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <span class="logo-icon">📮</span>
            <h1>추억배달 보관함</h1>
            <p class="subtitle">이번 달 부모님께 보낼 추억을 골라 배송을 신청하세요.</p>
        </header>

        <!-- 사용자 연동 정보 -->
        <div class="user-widget">
            <span>연동 계정</span>
            <span class="user-id-badge" id="userIdDisplay">kakao-test-user-999</span>
        </div>

        <!-- 갤러리 섹션 -->
        <section class="gallery-section">
            <h2 class="section-title">
                <span>보관된 사진 목록</span>
                <span class="photo-counter" id="selectCounter">0 / 10장 선택됨</span>
            </h2>
            <div id="galleryEmpty" class="gallery-empty" style="display: none;">
                💬 챗봇 대화방에 아직 전송된 사진이 없습니다.
            </div>
            <div id="galleryGrid" class="gallery-grid">
                <!-- 동적으로 채워짐 -->
            </div>
        </section>

        <!-- 배송지 정보 및 최종 편지 -->
        <section class="form-section">
            <h2 class="section-title" style="margin-bottom: 16px; border-left-color: #a5b4fc;">받는 사람 정보 및 편지</h2>
            
            <div class="form-group">
                <label for="recipientName">받는 사람 이름</label>
                <input type="text" id="recipientName" placeholder="예: 엄마 아빠, 아버님">
            </div>

            <div class="form-group">
                <label for="postcode">우편번호</label>
                <div class="address-row">
                    <input type="text" id="postcode" class="postcode-input" placeholder="우편번호 5자리">
                    <button type="button" class="btn-postcode" onclick="alert('프로토타입 버전으로, 우편번호와 주소를 직접 입력해 주세요.')">우편번호 찾기</button>
                </div>
            </div>

            <div class="form-group">
                <label for="recipientAddress">기본 주소</label>
                <input type="text" id="recipientAddress" placeholder="기본 주소를 입력하세요">
            </div>

            <div class="form-group">
                <label for="recipientAddressDetail">상세 주소</label>
                <input type="text" id="recipientAddressDetail" placeholder="동, 호수 및 우편함 위치 등 상세 주소">
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label for="letterContent">엽서 뒷면 최종 한 줄 편지</label>
                <textarea id="letterContent" placeholder="부모님께 보낼 따뜻한 한마디를 적어보세요. (예: 엄마 아빠, 이번 달에 찍은 아이 사진들 모아서 보내요!)"></textarea>
            </div>
        </section>

        <!-- 신청 전송 버튼 -->
        <button type="button" class="btn-submit" id="btnConfirmSubmit" disabled>
            <span>📮 엽서 배송 최종 신청하기</span>
        </button>
    </div>

    <!-- 성공 모달 -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-box">
            <span class="modal-icon">🎉</span>
            <h3 class="modal-title">엽서 묶음 배달 접수 완료!</h3>
            <p class="modal-text" id="modalDetailText">선택하신 사진 0장이 정성스레 제작되어 부모님 댁 우편함으로 배달 신청되었습니다.</p>
            <button type="button" class="btn-modal-close" id="btnModalClose">확인</button>
        </div>
    </div>

    <script src="chatbot_select.js"></script>
</body>
</html>
