<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추억배달 관리자 센터</title>
    <!-- Google Fonts 연동: 나눔손글씨 펜 및 Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <!-- html2canvas 및 jsPDF 라이브러리 연동 (실물 인쇄 렌더링용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- 상단 헤더 -->
        <header class="admin-header">
            <div class="admin-brand">
                <span class="admin-logo">📮</span>
                <div>
                    <h1>추억배달 관리자 센터</h1>
                    <p>실시간 엽서 배송 신청 현황 및 데이터 관리</p>
                </div>
            </div>
            <div class="admin-actions">
                <a href="index.html" class="btn-secondary">◀ 시뮬레이터로 이동</a>
                <a href="chatbot_test.html" class="btn-secondary" style="background-color: #FEE500; color: #191919; border-color: #FEE500; font-weight: 700;">💬 가상 챗봇 테스트</a>
                <button type="button" class="btn-primary" id="btnExportCSV">📥 배송 주소록 엑셀 다운로드 (CSV)</button>
            </div>
        </header>

        <!-- 대시보드 요약 위젯 -->
        <section class="admin-summary">
            <div class="summary-card">
                <h3>총 접수 주문</h3>
                <p id="totalCount">0건</p>
            </div>
            <div class="summary-card text-primary">
                <h3>이번 달 배송 대기</h3>
                <p id="pendingCount">0건</p>
            </div>
            <div class="summary-card text-accent">
                <h3>발송 완료 누적</h3>
                <p id="completedCount">0건</p>
            </div>
        </section>

        <!-- 메인 테이블 영역 -->
        <main class="admin-main">
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>주문 번호</th>
                            <th>신청 일시</th>
                            <th>자녀 성함</th>
                            <th>부모님 성함</th>
                            <th>우편번호</th>
                            <th>배송 주소</th>
                            <th>상세 주소</th>
                            <th>편지 내용</th>
                            <th>엽서 사진</th>
                            <th>발송 처리</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <!-- 동적으로 데이터 렌더링 예정 -->
                        <tr>
                            <td colspan="10" class="text-center py-4">주문 데이터를 불러오는 중입니다...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 엽서 상세 보기 및 인쇄용 미리보기 모달 -->
    <div class="modal-overlay" id="imageModal">
        <div class="modal-content admin-postcard-modal">
            <h2 class="modal-title">📮 엽서 인쇄용 미리보기</h2>
            <div class="admin-postcard-preview-container">
                <!-- 앞면 미리보기 -->
                <div class="preview-box">
                    <h4>앞면 (사진)</h4>
                    <div class="postcard-preview-face preview-front" id="modalFrontPreview" style="position: relative;">
                        <button type="button" id="btnPrevPhoto" class="gallery-nav-btn prev" style="display: none;">&lt;</button>
                        <button type="button" id="btnNextPhoto" class="gallery-nav-btn next" style="display: none;">&gt;</button>
                        <div id="photoIndexBadge" class="gallery-index-badge" style="display: none;">1 / 1</div>
                    </div>
                </div>
                <!-- 뒷면 미리보기 -->
                <div class="preview-box">
                    <h4>뒷면 (편지글)</h4>
                    <div class="postcard-preview-face preview-back">
                        <div class="back-content-center">
                            <div class="letter-text-center" id="modalLetterPreview"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="modal-download-actions">
                <button type="button" class="btn-primary" id="btnDownloadPDF">📄 인쇄용 양면 PDF 다운로드 (150x100mm)</button>
                <button type="button" class="btn-secondary" id="btnDownloadFrontPNG">🖼️ 앞면 PNG 다운로드</button>
                <button type="button" class="btn-secondary" id="btnDownloadBackPNG">✍️ 뒷면 PNG 다운로드</button>
                <button type="button" class="btn-close-modal" id="btnCloseImageModal">닫기</button>
            </div>
            
            <!-- 진행 상태 표시용 로딩 오버레이 -->
            <div class="modal-loading-overlay" id="modalLoadingOverlay">
                <div class="loading-spinner"></div>
                <p id="modalLoadingText">인쇄용 데이터 생성 중...</p>
            </div>
        </div>
    </div>

    <!-- 오프스크린 인쇄 전용 고해상도 템플릿 DOM (3:2 비율, 1800x1200) -->
    <div id="printTemplate" class="offscreen-print-template">
        <!-- 앞면 템플릿 -->
        <div class="print-face print-front" id="printFront"></div>
        <!-- 뒷면 템플릿 -->
        <div class="print-face print-back" id="printBack">
            <div class="back-content-center-print">
                <div class="letter-text-center-print" id="printLetter"></div>
            </div>
        </div>
    </div>

    <script src="admin.js?v=2"></script>
</body>
</html>
